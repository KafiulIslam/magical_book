name: magical_book
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.4

environment:
  sdk: ^3.5.2


dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8


  #UI libraries
  gap: ^3.0.1
  flutter_screenutil: ^5.9.0
  flutter_svg: ^2.1.0
  photo_view: ^0.14.0



  # State Management
  flutter_riverpod: ^2.6.1

  # utls
  # Text-to-Speech
  flutter_tts: ^4.0.2
  # Audio Player
  audioplayers: ^6.1.0
  shared_preferences: ^2.3.2


  # Navigation
  go_router: ^14.2.7

  # Ads
  google_mobile_ads: ^5.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^4.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/svgs/
    - assets/images/banglaChora/
    - assets/images/fruits/
    - assets/images/flowers/
    - assets/images/ritu/
    - assets/images/rhymes/
    - assets/images/bodyParts/
    - assets/images/animal/
    - assets/images/birds/
    - assets/images/multiplication/
    - assets/images/surah/
    - assets/images/gojol/
    - assets/audio/gojol/
    - assets/audio/alphabet/
    - assets/audio/surah/
    - assets/audio/multiplication/
    - assets/audio/rhymes/
    - assets/audio/bodyParts/
    - assets/audio/bornoMala/
    - assets/audio/bornoMala/banjon/
    - assets/audio/banglaPoem/
    - assets/audio/engAlphabet/
    - assets/audio/fruits/
    - assets/audio/flowers/
    - assets/audio/animal/
    - assets/audio/birds/
    - assets/audio/others/
    - assets/audio/math/banglaSongkha/


  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # Custom fonts
  fonts:
    - family: Kalpurush
      fonts:
        - asset: assets/fonts/Kalpurush.ttf
    
    - family: NotoSansArabic
      fonts:
        - asset: assets/fonts/NotoSansArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/NotoSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/NotoSansArabic-Bold.ttf
          weight: 700
        - asset: assets/fonts/NotoSansArabic-ExtraBold.ttf
          weight: 800
